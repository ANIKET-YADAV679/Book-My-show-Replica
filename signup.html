<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>

<body>

    <div>
        <h2>Create an Account</h2>

        <form action="#" method="POST">

            <div>
                <label for="fullname">Full Name</label>
                <br>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>

            <br>

            <div>
                <label for="email">Email Address</label>
                <br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <br>

            <div>
                <label for="password">Password</label>
                <br>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <br>

            <div>
                <label for="confirm-password">Confirm Password</label>
                <br>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat your password"
                    required>
            </div>

            <br>

            <div>
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms and Conditions</label>
            </div>

            <br>

            <div>
                <a href="D:\CU -SUMMER CAMP 2025-26\FULL STACK CLASSES\book my show\index.html">
                    <button type="button">Sign Up</button>
                </a>
            </div>

        </form>

        <br>

        <div>
            <p>Already have an account? <a href="D:\CU -SUMMER CAMP 2025-26\FULL STACK CLASSES\book my show\signin.html">Sign in here</a></p>
        </div>

    </div>

</body>

</html>
